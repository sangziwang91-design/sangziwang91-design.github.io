name: Site integrity checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  site-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate site data
        run: python scripts/validate_site_data.py

      - name: Check generated sections
        run: python scripts/build_site.py --check

      - name: Check public record parity
        run: python scripts/check_records_parity.py

      - name: Check local site links
        run: python scripts/check_site_links.py

      - name: Check public boundary
        run: python scripts/check_public_boundary.py
